<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wallet demo</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <section class="login-screen">
      <div class="login-card">
        <p class="eyebrow">Wallet non configure</p>
        <h1 id="title">Wallet non configure</h1>
        <p class="muted" id="message"></p>
        <div class="notice" id="member"></div>
        <a class="secondary link-button" href="/">Retour dashboard</a>
      </div>
    </section>
    <script>
      const params = new URLSearchParams(location.search);
      const platform = params.get("platform") === "apple" ? "Apple Wallet" : "Google Wallet";
      const missing = platform === "Apple Wallet"
        ? "APPLE_PASS_TYPE_ID, APPLE_TEAM_ID, APPLE_CERT_P12 et APPLE_WWDR_CERT"
        : "GOOGLE_ISSUER_ID et GOOGLE_SERVICE_ACCOUNT_JSON";
      document.querySelector("#title").textContent = `${platform} non configure`;
      document.querySelector("#message").innerHTML = `Cette page remplace le vrai lien ${platform} tant que <strong>${missing}</strong> ne sont pas configures sur le serveur.`;
      document.querySelector("#member").textContent = `Carte : ${params.get("member") || "demo"}`;
    </script>
  </body>
</html>
