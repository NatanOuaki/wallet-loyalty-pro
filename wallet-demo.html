<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wallet demo</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <section class="login-screen">
      <div class="login-card">
        <p class="eyebrow">Mode demo</p>
        <h1>Google Wallet non configure</h1>
        <p class="muted">
          Cette page remplace le vrai lien Google Wallet tant que les variables
          <strong>GOOGLE_ISSUER_ID</strong> et <strong>GOOGLE_SERVICE_ACCOUNT_JSON</strong>
          ne sont pas configurees.
        </p>
        <div class="notice" id="member"></div>
        <a class="secondary link-button" href="/">Retour dashboard</a>
      </div>
    </section>
    <script>
      const params = new URLSearchParams(location.search);
      document.querySelector("#member").textContent = `Carte : ${params.get("member") || "demo"}`;
    </script>
  </body>
</html>
