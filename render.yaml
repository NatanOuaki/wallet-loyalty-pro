services:
  - type: web
    name: wallet-loyalty-pro
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        value: https://wallet-loyalty-pro.onrender.com
      - key: DB_FILE
        value: data/render-db.json
